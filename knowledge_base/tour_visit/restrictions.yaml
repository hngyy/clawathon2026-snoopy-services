_meta:
  tool_name: get_booking_restrictions
  description: "Booking constraints for corporate visits: advance notice required, group size limits, available days and hours, and restricted areas."

advance_notice_days:
  default: 3          # minimum days before the visit date
  large_group: 14     # groups > 20 people

group_size:
  min: 1
  max: 30

available_days: [Monday, Tuesday, Wednesday, Thursday, Friday]
available_hours: "09:00–16:00"
excluded: "Public holidays"

restricted_areas:
  - Server rooms
  - R&D labs
  - Executive floors (unless pre-approved)
