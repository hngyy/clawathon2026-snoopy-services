# ── VNG Campus Bot — configuration ───────────────────────────────────
# Edit this file to change routing, email, and per-service settings.
# NEVER put secrets (SMTP password, API keys) here — those come from env vars.

email:
  # Sender shown on outgoing mail. Real delivery via app/infrastructure/outlook_client.py.
  from_address: "no-reply@vng.com.vn"
  from_name: "VNG Campus Bot"

# Routing strategy for the agent graph:
#   flat       — all service tools bound to one LLM per role (best for 1–3 services)
#   supervisor — classify intent → dispatch to a per-service subgraph (best for 4+)
# See docs/supervisor-routing.md.
routing: flat

# Roles — who the caller is, resolved from context.user_id (the platform injects it
# from the X-GreenNode-AgentBase-User-Id header). Matched case-insensitively.
#   default: true      → the role for any user not matched to another role
#   extends: <role>    → inherit that role's tools + prompt sections (e.g. owner is also a requester)
#   identities: [...]  → user ids that get this role
# To add a role: add an entry here and bind tools/prompts for it in a service.
roles:
  requester:
    default: true
  owner:
    extends: requester
    identities:
      - "tour-coordinator@vng.com.vn"
      - "owner"

services:
  tour_visit:
    enabled: true
    display_name: "VNG Campus Tour Visit"

    # The owner receives every new tour request and drives the follow-up process.
    owner:
      name: "Campus Tour Coordinator"
      email: "tour-coordinator@vng.com.vn"

    # Fields the bot must collect before submitting a corporate-visit request.
    # Set required: false to make a field optional (bot will still ask but won't block submission).
    request_fields:
      - key: requester_name
        label: "Your name (internal VNG organizer)"
        required: true
      - key: organization
        label: "Guest organization / company"
        required: true
      - key: guest_profile
        label: "Guest profile / background"
        required: true
      - key: visit_type
        label: "Visit type (tour only / tour + meeting)"
        required: true
      - key: visit_date
        label: "Preferred visit date"
        required: true
      - key: group_size
        label: "Number of guests"
        required: true
      - key: purpose
        label: "Purpose of the visit"
        required: true
      - key: contact_email
        label: "Contact email or VNG domain (e.g. hieunx or hieunx@vng.com.vn)"
        required: true
      - key: meeting_topic
        label: "Meeting topic (if tour + meeting)"
        required: false
      - key: partner_gift
        label: "Partner gift"
        required: false

    # Supporting teams the owner (CC coordinator) loops in to prepare a visit.
    # channel: how the owner reaches them —
    #   "trello" → create a card on the team's Trello list (set trello_list_id)
    #   "sheets" → append a task row to the shared Google Sheet
    #   "email"  → send an email (also the fallback when a channel's client is unconfigured)
    # NOTE: BIE/EB/PR names + emails are placeholders — confirm with CC. IT/AF are from the source doc.
    teams:
      - key: "bie"
        name: "Brand & Internal Events (BIE)"
        channel: "trello"
        #email: "bie@vng.com.vn"
        email: "hieunx@vng.com.vn"
        trello_list_id: "6a2e51af8d92f52833002064"  # "To Do" list on BIE team board
        responsibilities:
          - "Photography"
          - "Welcome screen design"
          - "Partner gifts & tea break"
      - key: "eb"
        name: "Employer Branding (EB)"
        channel: "sheets"
        #email: "eb@vng.com.vn"
        email: "hieunx@vng.com.vn"
        responsibilities:
          - "Welcome screen display & presentation"
          - "Social & internal communications"
      - key: "pr"
        name: "Public Relations (PR)"
        channel: "sheets"
        #email: "pr@vng.com.vn"
        email: "hieunx@vng.com.vn"
        responsibilities:
          - "Media & press coverage"
      - key: "it"
        name: "IT"
        channel: "sheets"
        #email: "request.it@vng.com.vn"
        email: "hieunx@vng.com.vn"
        responsibilities:
          - "Equipment & technical setup (laptop, screen, projector, system support)"
      - key: "af"
        name: "Administration & Facilities (AF)"
        channel: "sheets"
        #email: "afservices@vng.com.vn"
        email: "hieunx@vng.com.vn"
        responsibilities:
          - "Room booking & setup"
          - "Water & refreshments"
